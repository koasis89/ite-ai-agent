<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', sans-serif; fill: #17324d; }
      .subtitle { font: 600 18px 'Segoe UI', sans-serif; fill: #36556f; }
      .label { font: 700 17px 'Segoe UI', sans-serif; fill: #17324d; }
      .body { font: 14px 'Segoe UI', sans-serif; fill: #2f5068; }
      .small { font: 12px 'Segoe UI', sans-serif; fill: #547088; }
      .layerA { fill: #eef7f0; stroke: #4f9d69; stroke-width: 2; rx: 18; }
      .layerB { fill: #eef5fb; stroke: #4e7aa7; stroke-width: 2; rx: 18; }
      .layerC { fill: #fff8ec; stroke: #d1902f; stroke-width: 2; rx: 18; }
      .layerD { fill: #f7f3ff; stroke: #7a68c7; stroke-width: 2; rx: 18; }
      .node { fill: #ffffff; stroke: #8fa4b7; stroke-width: 1.6; rx: 14; }
      .arrow { stroke: #4c697f; stroke-width: 2.4; fill: none; marker-end: url(#arrowHead); }
      .line { stroke: #4c697f; stroke-width: 2.4; fill: none; }
      .dash { stroke: #7d92a8; stroke-width: 2; fill: none; stroke-dasharray: 8 6; }
      .tag { font: 700 11px 'Segoe UI', sans-serif; fill: #4c697f; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c697f" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="980" fill="#ffffff" />
  <text x="44" y="54" class="title">oh-my-codex-js 논리 배치 아키텍처</text>
  <text x="44" y="86" class="subtitle">소스 분석 지도와 맞춘 CLI, 카탈로그, 플러그인 미러, MCP 런타임, 팀 실행의 배치 구조</text>

  <rect x="70" y="130" width="1260" height="110" class="layerA" />
  <text x="100" y="165" class="label">명령 진입 계층</text>
  <text x="100" y="192" class="body">사용자 명령이 가장 먼저 들어오는 CLI 디스패처와 보조 진입점</text>
  <rect x="340" y="152" width="180" height="60" class="node" />
  <text x="373" y="188" class="body">src/cli/index.ts</text>
  <rect x="555" y="152" width="150" height="60" class="node" />
  <text x="585" y="188" class="body">omx 래퍼</text>
  <rect x="730" y="152" width="170" height="60" class="node" />
  <text x="757" y="188" class="body">setup / doctor</text>
  <rect x="925" y="152" width="250" height="60" class="node" />
  <text x="970" y="188" class="body">team / ralph / ultragoal</text>

  <rect x="70" y="265" width="1260" height="135" class="layerB" />
  <text x="100" y="300" class="label">오케스트레이션 계층</text>
  <text x="100" y="327" class="body">설정, 훅, 상태, 팀 실행을 연결하고 세션 전환을 조율하는 중심 계층</text>
  <rect x="210" y="288" width="170" height="70" class="node" />
  <text x="246" y="328" class="body">src/cli/setup.ts</text>
  <rect x="405" y="288" width="170" height="70" class="node" />
  <text x="447" y="328" class="body">src/hooks/*</text>
  <rect x="600" y="288" width="170" height="70" class="node" />
  <text x="644" y="328" class="body">src/state/*</text>
  <rect x="795" y="288" width="170" height="70" class="node" />
  <text x="842" y="328" class="body">src/team/*</text>
  <rect x="990" y="288" width="200" height="70" class="node" />
  <text x="1030" y="328" class="body">src/cli/team.ts</text>

  <rect x="70" y="425" width="1260" height="140" class="layerC" />
  <text x="100" y="460" class="label">표면/카탈로그 계층</text>
  <text x="100" y="487" class="body">프롬프트, 스킬, 카탈로그 SSOT, 플러그인 미러가 정합성을 유지하는 계층</text>
  <rect x="180" y="448" width="170" height="78" class="node" />
  <text x="220" y="492" class="body">prompts/</text>
  <rect x="375" y="448" width="170" height="78" class="node" />
  <text x="421" y="492" class="body">skills/</text>
  <rect x="570" y="448" width="210" height="78" class="node" />
  <text x="606" y="492" class="body">src/catalog/manifest.json</text>
  <rect x="805" y="448" width="210" height="78" class="node" />
  <text x="834" y="492" class="body">plugins/oh-my-codex/skills/</text>
  <rect x="1040" y="448" width="180" height="78" class="node" />
  <text x="1074" y="492" class="body">.mcp.json</text>

  <rect x="70" y="590" width="1260" height="150" class="layerD" />
  <text x="100" y="625" class="label">MCP 런타임 계층</text>
  <text x="100" y="652" class="body">state, memory, code-intel, trace, wiki 서버와 stdio 노출 지점을 묶는 표준 실행 계층</text>
  <rect x="200" y="618" width="170" height="80" class="node" />
  <text x="236" y="662" class="body">src/cli/mcp-serve.ts</text>
  <rect x="395" y="618" width="170" height="80" class="node" />
  <text x="448" y="662" class="body">src/mcp/*</text>
  <rect x="590" y="618" width="170" height="80" class="node" />
  <text x="637" y="662" class="body">src/cli/mcp-parity.ts</text>
  <rect x="785" y="618" width="170" height="80" class="node" />
  <text x="838" y="662" class="body">src/cli/doctor.ts</text>
  <rect x="980" y="618" width="170" height="80" class="node" />
  <text x="1020" y="662" class="body">src/catalog/*</text>

  <rect x="70" y="760" width="600" height="135" class="layerA" />
  <text x="100" y="795" class="label">실행 보조 계층</text>
  <text x="100" y="822" class="body">tmux, HUD, sidecar, worker pane으로 팀 실행을 시각화하고 분리하는 보조 계층</text>
  <rect x="250" y="782" width="120" height="72" class="node" />
  <text x="282" y="825" class="body">tmux</text>
  <rect x="390" y="782" width="120" height="72" class="node" />
  <text x="427" y="825" class="body">HUD</text>
  <rect x="530" y="782" width="120" height="72" class="node" />
  <text x="559" y="825" class="body">sidecar</text>

  <rect x="700" y="760" width="630" height="135" class="layerB" />
  <text x="730" y="795" class="label">검증/배포 계층</text>
  <text x="730" y="822" class="body">sync, verify, marketplace, native asset 해석이 결합되는 배포 보조 계층</text>
  <rect x="875" y="782" width="140" height="72" class="node" />
  <text x="906" y="825" class="body">sync:plugin</text>
  <rect x="1035" y="782" width="140" height="72" class="node" />
  <text x="1060" y="825" class="body">verify:plugin-bundle</text>
  <rect x="1195" y="782" width="110" height="72" class="node" />
  <text x="1216" y="825" class="body">marketplace</text>

  <path d="M610 212 L610 265" class="line" />
  <path d="M610 400 L610 425" class="line" />
  <path d="M610 565 L610 590" class="line" />
  <path d="M340 212 L340 288" class="arrow" />
  <path d="M480 212 L480 288" class="arrow" />
  <path d="M675 212 L675 288" class="arrow" />
  <path d="M845 212 L845 288" class="arrow" />
  <path d="M1015 212 L1015 288" class="arrow" />
  <path d="M280 362 L280 448" class="arrow" />
  <path d="M475 362 L475 448" class="arrow" />
  <path d="M675 362 L675 448" class="arrow" />
  <path d="M870 362 L870 448" class="arrow" />
  <path d="M1140 362 L1140 448" class="arrow" />
  <path d="M285 526 L285 618" class="arrow" />
  <path d="M480 526 L480 618" class="arrow" />
  <path d="M695 526 L695 618" class="arrow" />
  <path d="M890 526 L890 618" class="arrow" />
  <path d="M1125 526 L1125 618" class="arrow" />

  <path d="M610 740 L610 760" class="line" />
  <path d="M1000 740 L1000 760" class="line" />
  <text x="92" y="736" class="small">보조 계층은 실행 가시성과 정합성 검증을 담당하고, 직접적인 도메인 로직은 위쪽 계층에 남긴다.</text>

  <text x="72" y="936" class="small">배치 원칙: CLI는 진입점, prompts/skills는 실행 표면, catalog/mirror는 정합성 기준, mcp/runtime는 표준 연결, tmux/HUD/sidecar는 실행 보조로 분리한다.</text>
</svg>