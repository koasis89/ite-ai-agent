<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #17324d; }
      .subtitle { font: 600 17px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #36556f; }
      .label { font: 700 17px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #17324d; }
      .body { font: 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #2f5068; }
      .small { font: 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #547088; }
      .tiny { font: 11px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #60798f; }
      .layerA { fill: #eef7f0; stroke: #4f9d69; stroke-width: 2; rx: 18; }
      .layerB { fill: #eef5fb; stroke: #4e7aa7; stroke-width: 2; rx: 18; }
      .layerC { fill: #fff8ec; stroke: #d1902f; stroke-width: 2; rx: 18; }
      .layerD { fill: #f7f3ff; stroke: #7a68c7; stroke-width: 2; rx: 18; }
      .layerE { fill: #fff2f2; stroke: #c96b6b; stroke-width: 2; rx: 18; }
      .node { fill: #ffffff; stroke: #8fa4b7; stroke-width: 1.6; rx: 14; }
      .nodeStrong { fill: #ffffff; stroke: #4e7aa7; stroke-width: 2.2; rx: 14; }
      .arrow { stroke: #4c697f; stroke-width: 2.4; fill: none; marker-end: url(#arrowHead); }
      .line { stroke: #4c697f; stroke-width: 2.4; fill: none; }
      .dash { stroke: #7d92a8; stroke-width: 2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrowHeadSoft); }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c697f" />
    </marker>
    <marker id="arrowHeadSoft" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7d92a8" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1040" fill="#ffffff" />
  <text x="44" y="54" class="title">oh-my-codex-js 논리 아키텍처</text>
  <text x="44" y="86" class="subtitle">Codex 위에 얹히는 OMX 오케스트레이션, 카탈로그, MCP, 팀 런타임, 문서 계약의 책임 분리</text>

  <rect x="70" y="125" width="1260" height="110" class="layerB" />
  <text x="100" y="160" class="label">Codex 호스트 / 사용자 세션 계층</text>
  <text x="100" y="187" class="body">기본 에이전트 실행, 스레드·목표·컨텍스트를 관리하고</text>
  <text x="100" y="207" class="body">OMX 런타임을 호출하는 상위 플랫폼</text>
  <rect x="470" y="152" width="170" height="58" class="node" />
  <text x="520" y="186" class="body">Codex 세션</text>
  <rect x="675" y="152" width="170" height="58" class="node" />
  <text x="718" y="186" class="body">Goal 시스템</text>
  <rect x="880" y="152" width="190" height="58" class="node" />
  <text x="929" y="186" class="body">Config.toml</text>
  <rect x="1105" y="152" width="155" height="58" class="node" />
  <text x="1147" y="186" class="body">AGENTS.md</text>

  <rect x="70" y="260" width="1260" height="132" class="layerA" />
  <text x="100" y="295" class="label">OMX CLI / 설정 합성 계층</text>
  <text x="100" y="322" class="body">`omx` 명령이 설치, 진단, 설정 </text>
  <text x="100" y="342" class="body">병합, 훅 등록, 세션 시작 </text>
  <text x="100" y="362" class="body">메트릭을 조율하는 제어면</text>
  <rect x="305" y="292" width="155" height="68" class="nodeStrong" />
  <text x="358" y="322" class="body">omx CLI</text>
  <text x="336" y="342" class="small">src/cli/index.ts</text>
  <rect x="495" y="292" width="155" height="68" class="node" />
  <text x="543" y="322" class="body">setup</text>
  <text x="518" y="342" class="small">config 생성·병합</text>
  <rect x="685" y="292" width="155" height="68" class="node" />
  <text x="733" y="322" class="body">doctor</text>
  <text x="716" y="342" class="small">상태 진단</text>
  <rect x="875" y="292" width="170" height="68" class="node" />
  <text x="926" y="322" class="body">hooks</text>
  <text x="905" y="342" class="small">세션 오버레이</text>
  <rect x="1080" y="292" width="170" height="68" class="node" />
  <text x="1123" y="322" class="body">mcp-serve</text>
  <text x="1108" y="342" class="small">stdio 서버 노출</text>

  <rect x="70" y="420" width="1260" height="145" class="layerC" />
  <text x="90" y="455" class="label">카탈로그 / 라우팅 표면 계층</text>
  <text x="90" y="482" class="body">역할 프롬프트, 스킬, </text>
  <text x="90" y="502" class="body">플러그인 미러,</text>
  <text x="90" y="522" class="body">매니페스트를 기준으로 </text>
  <text x="90" y="547" class="body">작업 의도를 실행 표면에 매핑</text>
  <rect x="245" y="455" width="155" height="78" class="node" />
  <text x="287" y="486" class="body">prompts/</text>
  <text x="270" y="507" class="small">역할 지시문</text>
  <rect x="430" y="455" width="155" height="78" class="node" />
  <text x="477" y="486" class="body">skills/</text>
  <text x="458" y="507" class="small">워크플로우</text>
  <rect x="615" y="455" width="195" height="78" class="nodeStrong" />
  <text x="666" y="486" class="body">catalog SSOT</text>
  <text x="650" y="507" class="small">manifest + reader</text>
  <rect x="840" y="455" width="200" height="78" class="node" />
  <text x="881" y="486" class="body">plugin mirror</text>
  <text x="867" y="507" class="small">plugins/oh-my-codex</text>
  <rect x="1070" y="455" width="175" height="78" class="node" />
  <text x="1115" y="486" class="body">keyword triage</text>
  <text x="1100" y="507" class="small">role routing</text>

  <rect x="70" y="592" width="1260" height="154" class="layerD" />
  <text x="90" y="620" class="label">실행 워크플로우 / 에이전트 운영 계층</text>
  <text x="90" y="654" class="body">단일명령부터 멀티워커까지 </text>
  <text x="90" y="674" class="body">계획·분해·실행·검증·재개를 </text>
  <text x="90" y="694" class="body">담당하는 주 실행면</text>
  <rect x="260" y="628" width="120" height="82" class="node" />
  <text x="288" y="663" class="body">team</text>
  <text x="276" y="685" class="small">tmux workers</text>
  <rect x="395" y="628" width="150" height="82" class="node" />
  <text x="438" y="663" class="body">ralph</text>
  <text x="419" y="685" class="small">지속 실행 루프</text>
  <rect x="575" y="628" width="160" height="82" class="node" />
  <text x="616" y="663" class="body">ultragoal</text>
  <text x="598" y="685" class="small">장기 목표 관리</text>
  <rect x="765" y="628" width="170" height="82" class="node" />
  <text x="807" y="663" class="body">autoresearch</text>
  <text x="795" y="685" class="small">검증형 연구 루프</text>
  <rect x="965" y="628" width="170" height="82" class="node" />
  <text x="1002" y="663" class="body">performance</text>
  <text x="995" y="685" class="small">evaluator gate</text>
  <rect x="1165" y="628" width="120" height="82" class="node" />
  <text x="1197" y="663" class="body">wiki</text>
  <text x="1189" y="685" class="small">지식 저장</text>

  <rect x="70" y="775" width="620" height="145" class="layerE" />
  <text x="100" y="810" class="label">MCP / 상태 지속성 계층</text>
  <text x="100" y="837" class="body">tools, resources, prompts 표준 </text>
  <text x="100" y="857" class="body">인터페이스와 상태 서버를 통해 </text>
  <text x="100" y="877" class="body">실행 흐름을 복구 가능하게 유지</text>
  <rect x="320" y="805" width="135" height="74" class="node" />
  <text x="357" y="837" class="body">state</text>
  <text x="344" y="858" class="small">workflow 전이</text>
  <rect x="475" y="805" width="135" height="74" class="node" />
  <text x="508" y="837" class="body">memory</text>
  <text x="508" y="858" class="small">trace/wiki</text>

  <rect x="720" y="775" width="610" height="145" class="layerA" />
  <text x="750" y="800" class="label">아티팩트 / 문서 계약 / 검증 계층</text>
  <text x="750" y="837" class="body">AGENTS, docs, contracts, QA,</text>
  <text x="750" y="860" class="body">release gate, 네이티브 하네스가</text>
  <text x="750" y="890" class="body">실행규칙과 배포품질의 기준선으로 동작</text>
  <rect x="960" y="805" width="110" height="74" class="node" />
  <text x="991" y="837" class="body">docs</text>
  <text x="982" y="858" class="small">contracts</text>
  <rect x="1090" y="805" width="110" height="74" class="node" />
  <text x="1124" y="837" class="body">QA</text>
  <text x="1110" y="858" class="small">verification</text>
  <rect x="1220" y="805" width="85" height="74" class="node" />
  <text x="1240" y="837" class="body">crates</text>
  <text x="1238" y="858" class="small">native</text>

  <path d="M700 235 L700 260" class="line" />
  <path d="M700 392 L700 420" class="line" />
  <path d="M700 565 L700 592" class="line" />
  <path d="M510 746 L510 775" class="line" />
  <path d="M915 746 L915 775" class="line" />

  <path d="M1240 515 C1310 585 1320 720 1235 805" class="dash" />
  <text x="1090" y="560" class="tiny">플러그인 미러와 문서 계약은</text>
  <text x="1090" y="577" class="tiny">배포 전 drift 검증 대상</text>

  <path d="M310 710 C220 745 210 800 320 835" class="dash" />
  <text x="105" y="725" class="tiny">팀 실행 상태는 MCP state와</text>
  <text x="105" y="742" class="tiny">.omx 아티팩트에 남아 재개됨</text>

  <text x="72" y="970" class="small">핵심 해석: Codex는 세션과 목표를 소유하고, OMX는 CLI·훅·카탈로그·스킬·팀 런타임을 통해 작업을 구조화한다.</text>
  <text x="72" y="993" class="small">MCP는 카탈로그 확보와 실행 호출의 표준 경계이며, docs/contracts/QA는 런타임 동작을 검증 가능한 계약으로 고정한다.</text>
</svg>
